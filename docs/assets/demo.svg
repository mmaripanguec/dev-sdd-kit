<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" font-family="ui-monospace,Menlo,Consolas,monospace" role="img" aria-label="Step-by-step demo: environment from scratch, spec for an ADK plus Gemini customer assistant, human gate approvals, TDD, and a live interaction with human-approved escalation">
  <rect width="900" height="540" rx="12" fill="#0d1420"/>
  <rect width="900" height="34" rx="12" fill="#182a42"/>
  <rect y="22" width="900" height="12" fill="#182a42"/>
  <circle cx="22" cy="17" r="6" fill="#ff5f57"/>
  <circle cx="42" cy="17" r="6" fill="#febc2e"/>
  <circle cx="62" cy="17" r="6" fill="#28c840"/>
  <text x="450" y="22" font-size="12" fill="#8fa4bd" text-anchor="middle">demo — a customer assistant (Google ADK + Gemini), built the factory way</text>

  <g font-size="13.5">
    <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.25s" begin="0.4s" fill="freeze"/>
      <text x="24" y="64" fill="#5fce96">$ <tspan fill="#e8eaed">git clone &lt;template-url&gt; demo &amp;&amp; cd demo &amp;&amp; ./scripts/init-sistema.sh demo</tspan></text></g>
    <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.25s" begin="1.4s" fill="freeze"/>
      <text x="24" y="92" fill="#8fa4bd">✔ workspace instantiated — registry, skills and rules ready</text></g>
    <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.25s" begin="2.4s" fill="freeze"/>
      <text x="24" y="120" fill="#5fce96">$ <tspan fill="#e8eaed">claude</tspan>   <tspan fill="#8fa4bd">→</tspan>   <tspan fill="#e8eaed">/spec-create customer-assistant "ADK agent on Gemini for customer questions"</tspan></text></g>
    <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.25s" begin="3.6s" fill="freeze"/>
      <text x="24" y="148" fill="#66aef0">? clarify 1/2 — knowledge source: [A] curated FAQ file  [B] live website  <tspan fill="#e8eaed">→ A</tspan></text></g>
    <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.25s" begin="4.8s" fill="freeze"/>
      <text x="24" y="176" fill="#66aef0">? clarify 2/2 — sensitive topics: [A] auto-answer  [B] escalate to a HUMAN  <tspan fill="#e8eaed">→ B</tspan></text></g>
    <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.25s" begin="6s" fill="freeze"/>
      <text x="24" y="204" fill="#8fa4bd">✔ spec written — stories P1–P3 · Gherkin criteria · measurable success criteria</text></g>
    <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.25s" begin="7.2s" fill="freeze"/>
      <text x="24" y="232" fill="#e0a458">⏸ GATE PO/TL — waiting for human…   <tspan fill="#e8eaed">👤 "aprobado"</tspan>   <tspan fill="#28c840">✔ recorded (who · when · commit)</tspan></text></g>
    <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.25s" begin="8.6s" fill="freeze"/>
      <text x="24" y="260" fill="#e0a458">⏸ GATE DoR — /spec-review 13/13 · /consistencia APTO   <tspan fill="#e8eaed">👤 "aprobado"</tspan> <tspan fill="#28c840">✔</tspan></text></g>
    <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.25s" begin="10s" fill="freeze"/>
      <text x="24" y="288" fill="#5fce96">$ <tspan fill="#e8eaed">/implement-task specs/2026-07-customer-assistant.md T1</tspan></text></g>
    <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.25s" begin="11.2s" fill="freeze"/>
      <text x="24" y="316" fill="#ff6b6b">✔ RED first — 6 failing tests committed <tspan fill="#8fa4bd">(sensitive topics can NEVER auto-answer)</tspan></text></g>
    <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.25s" begin="12.4s" fill="freeze"/>
      <text x="24" y="344" fill="#28c840">✔ GREEN — agent + escalation queue pass · tests untouched</text></g>
    <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.25s" begin="13.6s" fill="freeze"/>
      <text x="24" y="372" fill="#5fce96">$ <tspan fill="#e8eaed">adk run customer_assistant</tspan></text></g>
    <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.25s" begin="14.8s" fill="freeze"/>
      <text x="24" y="400" fill="#c3d2e4">› client: <tspan fill="#e8eaed">"I think there's a charge I didn't make on my card"</tspan></text></g>
    <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.25s" begin="16s" fill="freeze"/>
      <text x="24" y="428" fill="#e0a458">⚠ sensitive (possible fraud) → escalated with draft reply   <tspan fill="#e8eaed">👤 human approves</tspan> <tspan fill="#28c840">✔</tspan></text></g>
    <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.25s" begin="17.2s" fill="freeze"/>
      <text x="24" y="456" fill="#c3d2e4">› assistant <tspan fill="#8fa4bd">(gemini-2.5-flash)</tspan>: <tspan fill="#e8eaed">"I've alerted our team — your card is protected. Here's what happens next…"</tspan></text></g>
    <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.25s" begin="18.6s" fill="freeze"/>
      <text x="24" y="492" fill="#e0a458">⏸ GATE QA/PR — /convergir: 0 gaps   <tspan fill="#e8eaed">👤 "aprobado"</tspan>   <tspan fill="#5fce96">→ shipped. The human decided at every gate. ∎</tspan></text></g>
  </g>
</svg>
