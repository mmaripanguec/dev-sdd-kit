<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" role="img" aria-label="dev-sdd-kit — the spec-driven factory for multi-repo systems">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1420"/>
      <stop offset="1" stop-color="#12233b"/>
    </linearGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#66aef0"/>
      <stop offset="1" stop-color="#5fce96"/>
    </linearGradient>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#5a708c"/>
    </marker>
  </defs>

  <rect width="1280" height="320" fill="url(#bg)"/>

  <!-- marca de agua: grilla sutil -->
  <g stroke="#1d2f47" stroke-width="1">
    <line x1="0" y1="80" x2="1280" y2="80"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
  </g>

  <!-- texto principal -->
  <text x="72" y="128" font-family="-apple-system,'Segoe UI',Roboto,sans-serif"
        font-size="58" font-weight="800" fill="#f2f6fb">dev-sdd-kit</text>
  <rect x="74" y="146" width="330" height="5" rx="2.5" fill="url(#acc)"/>
  <text x="72" y="192" font-family="-apple-system,'Segoe UI',Roboto,sans-serif"
        font-size="25" font-weight="500" fill="#c3d2e4">The spec-driven factory for multi-repo systems</text>
  <text x="72" y="228" font-family="-apple-system,'Segoe UI',Roboto,sans-serif"
        font-size="17" fill="#8fa4bd">Human gates backed by permissions · strict TDD · docs and metrics that cannot lie</text>
  <text x="72" y="266" font-family="ui-monospace,Menlo,monospace"
        font-size="15" fill="#5fce96">$ /spec-create my-feature → gates → TDD → certify → operate</text>

  <!-- motivo: flujo con la spec al centro -->
  <g font-family="-apple-system,'Segoe UI',Roboto,sans-serif">
    <rect x="880" y="70" width="90" height="40" rx="7" fill="#182a42" stroke="#2c4364"/>
    <text x="925" y="95" font-size="14" fill="#c3d2e4" text-anchor="middle">specify</text>
    <rect x="1010" y="70" width="90" height="40" rx="7" fill="#182a42" stroke="#2c4364"/>
    <text x="1055" y="95" font-size="14" fill="#c3d2e4" text-anchor="middle">design</text>
    <rect x="1140" y="70" width="90" height="40" rx="7" fill="#182a42" stroke="#2c4364"/>
    <text x="1185" y="95" font-size="14" fill="#c3d2e4" text-anchor="middle">analyze</text>

    <rect x="880" y="140" width="350" height="44" rx="9" fill="#13253c" stroke="#66aef0" stroke-width="2"/>
    <text x="1055" y="167" font-size="16" font-weight="700" fill="#66aef0" text-anchor="middle">SPEC · the living contract</text>

    <rect x="880" y="214" width="90" height="40" rx="7" fill="#182a42" stroke="#2c4364"/>
    <text x="925" y="239" font-size="14" fill="#c3d2e4" text-anchor="middle">build</text>
    <rect x="1010" y="214" width="90" height="40" rx="7" fill="#182a42" stroke="#2c4364"/>
    <text x="1055" y="239" font-size="14" fill="#c3d2e4" text-anchor="middle">certify</text>
    <rect x="1140" y="214" width="90" height="40" rx="7" fill="#182a42" stroke="#2c4364"/>
    <text x="1185" y="239" font-size="14" fill="#c3d2e4" text-anchor="middle">operate</text>

    <line x1="925" y1="110" x2="925" y2="136" stroke="#5a708c" stroke-width="1.4" marker-end="url(#a)"/>
    <line x1="1055" y1="110" x2="1055" y2="136" stroke="#5a708c" stroke-width="1.4" marker-end="url(#a)"/>
    <line x1="1185" y1="110" x2="1185" y2="136" stroke="#5a708c" stroke-width="1.4" marker-end="url(#a)"/>
    <line x1="925" y1="184" x2="925" y2="210" stroke="#5a708c" stroke-width="1.4" marker-end="url(#a)"/>
    <line x1="1055" y1="184" x2="1055" y2="210" stroke="#5a708c" stroke-width="1.4" marker-end="url(#a)"/>
    <line x1="1185" y1="184" x2="1185" y2="210" stroke="#5a708c" stroke-width="1.4" marker-end="url(#a)"/>
  </g>
</svg>
