# Pipeline del workspace: sincroniza el mapa as-is y las metricas DORA.
# Variables (Repository settings > Repository variables; tokens marcar Secured)
# segun los proveedores declarados en repos.yaml:
#   BITBUCKET_USER / BITBUCKET_TOKEN   (App Password / API token / Access token)
#   GITHUB_TOKEN · GITLAB_TOKEN        (si el registro tiene repos de esos proveedores)
#   FACTORY_BOT_EMAIL                  (opcional: email del bot para los commits)
image: atlassian/default-image:4

definitions:
  steps:
    - step: &sync-as-is
        name: Sincronizar mapa as-is del sistema
        script:
          # setup.sh detecta BITBUCKET_TOKEN en el entorno y usa modo token
          - ./scripts/setup.sh
          - ./scripts/generate-as-is.sh
          # Con los repos clonados, deriva las metricas DORA reales (RN-F4);
          # dora.sh --check queda para verificar sin escribir (uso local/PRs)
          - ./scripts/dora.sh
          - |
            if ! git diff --quiet knowledge/as-is/ knowledge/uso.md; then
              git add knowledge/as-is/ knowledge/uso.md
              git -c user.email="${FACTORY_BOT_EMAIL:-fabrica-bot@example.com}" -c user.name=fabrica-bot \
                commit -m "chore(sync): mapa as-is + metricas DORA [skip ci]"
              git push origin HEAD
            else
              echo "as-is y DORA ya sincronizados"
            fi

pipelines:
  custom:
    as-is-sync:            # ejecucion manual desde la UI de Bitbucket
      - step: *sync-as-is
  branches:
    main:
      - step: *sync-as-is  # cada merge a main del workspace refresca el mapa
# Recomendado: Schedule diario sobre `custom: as-is-sync`
# (Repository > Pipelines > Schedules) para capturar cambios de los 3 repos.
