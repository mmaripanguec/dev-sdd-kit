# Registro de repositorios del sistema - UNICA fuente de verdad de la topologia.
# ESTE ES UN REGISTRO DE EJEMPLO (sistema demo 'homebanking' con URLs ficticias):
# para tu sistema, primero corre ./scripts/init-sistema.sh <nombre> y luego
# ./scripts/repo-add.sh <url-o-ruta> por cada repo real.
system:
  name: homebanking
  entrypoint: homebanking-pwa
repos:
  - name: homebanking-pwa-backend
    url: https://bitbucket.org/example-bank/homebanking-pwa-backend.git
    provider: bitbucket
    role: "servicios de negocio"
    deploy_order: 1
    domain: banking
  - name: homebanking-pwa-proxy
    url: https://bitbucket.org/example-bank/homebanking-pwa-proxy.git
    provider: bitbucket
    role: "BFF/gateway entre la PWA y el backend"
    deploy_order: 2
    domain: banking
  - name: homebanking-pwa
    url: https://bitbucket.org/example-bank/homebanking-pwa.git
    provider: bitbucket
    role: "frontend PWA del cliente"
    deploy_order: 3
    domain: banking
