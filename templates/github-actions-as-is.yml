# Workflow equivalent to bitbucket-pipelines.yml for workspaces hosted on
# GitHub: syncs the as-is map of the system declared in repos.yaml.
# Install: copy to .github/workflows/as-is-sync.yml in the workspace.
# Secrets according to the registry providers (Settings > Secrets and variables):
#   BITBUCKET_USER / BITBUCKET_TOKEN · GITLAB_TOKEN · GH_REPOS_TOKEN (si los
#   github repos are private; the implicit GITHUB_TOKEN only sees THIS repo).
# Optional FACTORY_BOT_EMAIL variable for the bot's commit email.
name: as-is-sync

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * *"   # daily: captures changes from the system repos
  workflow_dispatch: {}

jobs:
  sync-as-is:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Clone/update registry repos
        env:
          BITBUCKET_USER: ${{ secrets.BITBUCKET_USER }}
          BITBUCKET_TOKEN: ${{ secrets.BITBUCKET_TOKEN }}
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GH_REPOS_TOKEN }}
        run: ./scripts/setup.sh

      - name: Regenerate as-is map
        run: ./scripts/generate-as-is.sh

      - name: Derive DORA metrics (repos cloned; RN-F4)
        run: ./scripts/dora.sh

      - name: Regenerate derived documentation
        run: ./scripts/docs.sh

      - name: Commit if changed
        run: |
          if ! git diff --quiet knowledge/as-is/ knowledge/usage.md docs/arquitectura.html docs/architecture.en.html; then
            git add knowledge/as-is/ knowledge/usage.md docs/arquitectura.html docs/architecture.en.html
            git -c user.email="${FACTORY_BOT_EMAIL:-fabrica-bot@example.com}" \
                -c user.name=fabrica-bot \
              commit -m "chore(sync): as-is + DORA + documentacion [skip ci]"
            git push origin HEAD
          else
            echo "as-is, DORA y documentacion ya sincronizados"
          fi
        env:
          FACTORY_BOT_EMAIL: ${{ vars.FACTORY_BOT_EMAIL }}
