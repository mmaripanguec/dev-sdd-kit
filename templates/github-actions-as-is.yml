# Workflow equivalente a bitbucket-pipelines.yml para workspaces alojados en
# GitHub: sincroniza el mapa as-is del sistema declarado en repos.yaml.
# Instalar: copiar a .github/workflows/as-is-sync.yml en el workspace.
# Secrets segun los proveedores del registro (Settings > Secrets and variables):
#   BITBUCKET_USER / BITBUCKET_TOKEN · GITLAB_TOKEN · GH_REPOS_TOKEN (si los
#   repos de github son privados; el GITHUB_TOKEN implicito solo ve ESTE repo).
# Variable opcional FACTORY_BOT_EMAIL para el email de los commits del bot.
name: as-is-sync

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * *"   # diario: captura cambios de los repos del sistema
  workflow_dispatch: {}

jobs:
  sync-as-is:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Clonar/actualizar repos del registro
        env:
          BITBUCKET_USER: ${{ secrets.BITBUCKET_USER }}
          BITBUCKET_TOKEN: ${{ secrets.BITBUCKET_TOKEN }}
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GH_REPOS_TOKEN }}
        run: ./scripts/setup.sh

      - name: Regenerar mapa as-is
        run: ./scripts/generate-as-is.sh

      - name: Commitear si cambio
        run: |
          if ! git diff --quiet knowledge/as-is/; then
            git add knowledge/as-is/
            git -c user.email="${FACTORY_BOT_EMAIL:-fabrica-bot@example.com}" \
                -c user.name=fabrica-bot \
              commit -m "chore(as-is): sincroniza mapa del sistema [skip ci]"
            git push origin HEAD
          else
            echo "as-is ya sincronizado"
          fi
        env:
          FACTORY_BOT_EMAIL: ${{ vars.FACTORY_BOT_EMAIL }}
