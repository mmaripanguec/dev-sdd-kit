<!doctype html>
<html lang="{{LANG}}">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Architecture · {{SYSTEM}} · arc42 + C4</title>
<style>
  :root{
    --bg:#f4f6f8;--surface:#fff;--surface-2:#eceff3;--ink:#19212e;--ink-2:#4c586a;--ink-3:#74808f;
    --line:#d8dee6;--line-strong:#c2cad4;--accent:#0d7c7b;--accent-ink:#0a5f5e;--accent-soft:#dcefef;
    --crit:#b23b3b;--warn:#a9761f;--low:#5c6775;--crit-soft:#f4dede;--warn-soft:#f4e9d3;--low-soft:#e4e8ed;
    --diagram-bg:#f8fafb;--diagram-line:#cdd6dd;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,Arial,sans-serif;
  }
  @media (prefers-color-scheme:dark){:root{
    --bg:#0e131a;--surface:#151c26;--surface-2:#1c2531;--ink:#e7ecf2;--ink-2:#9aa6b6;--ink-3:#74808f;
    --line:#2a3542;--line-strong:#384656;--accent:#3bb6b1;--accent-ink:#7ed8d3;--accent-soft:#133433;
    --crit:#e58585;--warn:#d7ac63;--low:#909cac;--crit-soft:#3a2526;--warn-soft:#362d1c;--low-soft:#232c37;
  }}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:16px;line-height:1.65;-webkit-font-smoothing:antialiased}
  .wrap{max-width:940px;margin:0 auto;padding:40px 24px 96px}
  h1{font-size:clamp(1.9rem,4.5vw,2.6rem);line-height:1.1;letter-spacing:-.02em;margin:.2em 0 .3em;text-wrap:balance;font-weight:720}
  h2{font-size:1.4rem;letter-spacing:-.015em;margin:2.2em 0 .6em;font-weight:680;padding-bottom:10px;border-bottom:1px solid var(--line);scroll-margin-top:20px}
  h3{font-size:1.08rem;margin:1.6em 0 .4em;font-weight:660}
  p{margin:0 0 14px;max-width:74ch}
  a{color:var(--accent-ink);text-underline-offset:2px}
  strong{font-weight:640}
  code{font-family:var(--mono);font-size:.84em;background:var(--surface-2);color:var(--ink);padding:.1em .38em;border-radius:4px;border:1px solid var(--line);word-break:break-word}
  pre{margin:16px 0}
  pre>code{display:block;padding:14px 16px;overflow-x:auto;border-radius:10px;line-height:1.5}
  blockquote{margin:16px 0;padding:16px 20px;border:1px solid var(--line);border-left:3px solid var(--accent);background:var(--surface);border-radius:10px}
  blockquote p{max-width:none}
  hr{border:none;border-top:1px solid var(--line);margin:32px 0}
  ul,ol{padding-left:22px}
  li{margin-bottom:6px;max-width:74ch}
  li::marker{color:var(--accent)}
  .tablewrap{overflow-x:auto;margin:18px 0;border:1px solid var(--line);border-radius:10px}
  table{border-collapse:collapse;width:100%;font-size:.9rem;background:var(--surface);min-width:520px}
  th,td{text-align:left;padding:10px 15px;border-bottom:1px solid var(--line);vertical-align:top}
  thead th{font-family:var(--mono);font-size:.74rem;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-2);background:var(--surface-2)}
  tbody tr:last-child td{border-bottom:none}
  tbody tr:hover{background:var(--surface-2)}
  .mermaid{background:var(--diagram-bg);border:1px solid var(--diagram-line);border-radius:12px;padding:20px;margin:20px 0;overflow-x:auto;text-align:center}
  .eyebrow{font-family:var(--mono);font-size:.74rem;letter-spacing:.16em;text-transform:uppercase;color:var(--accent-ink);margin:0}
</style>
<script type="module">
  import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs";
  mermaid.initialize({ startOnLoad:true, theme:"neutral", securityLevel:"loose" });
</script>
</head>
<body>
<main class="wrap">
<p class="eyebrow">AS-IS architecture document · arc42 + C4 · knowledge</p>
{{CONTENT}}
</main>
</body>
</html>
